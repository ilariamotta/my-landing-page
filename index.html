<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Ilaria&nbsp;Motta&nbsp;-&nbsp;Web&nbsp;Designer&nbsp;&&nbsp;Developer&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</title>
    <script>  // Funzione per animare il titolo
        function scrollicon() {
            // Prende il titolo attuale
            var text = document.title;
            // Sposta il primo carattere alla fine
            document.title = text.substring(1) + text.substring(0, 1);
        }

        // Avvia la funzione ogni 150 millisecondi
        setInterval(scrollicon, 150);</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
